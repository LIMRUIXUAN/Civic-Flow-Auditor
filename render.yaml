services:
  # Python Google ADK backend (FastAPI). API only — deploy the frontend (Vite
  # build in civic-flow-auditor-prototype/dist) as a separate Render Static
  # Site pointing /api at this service's URL.
  # NOTE: this file must live at the git repo root — Render's Blueprint scan
  # (render.com > New > Blueprint) only looks for render.yaml at the repo
  # root, not in subdirectories.
  - type: web
    name: civic-flow-auditor-api
    runtime: python
    plan: starter
    rootDir: civic-flow-auditor-prototype/backend
    buildCommand: pip install -r requirements.txt && python -m playwright install --with-deps chromium
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: AUDIT_STORAGE_DIR
        value: .audit-runs
      - key: MAX_CONCURRENT_AUDITS
        value: "1"
      - key: AI_PROVIDER
        value: google
      # Set the actual key in the Render dashboard (kept out of source control).
      - key: GOOGLE_API_KEY
        sync: false
      # Run Celery tasks inline so no Redis broker is required for a single service.
      - key: CELERY_TASK_ALWAYS_EAGER
        value: "1"
      - key: ENABLE_OCR
        value: "1"
      - key: ENABLE_LIGHTHOUSE
        value: "0"
